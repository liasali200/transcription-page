<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="Footer" content="Footer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dist/style.css" />

  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro" rel="stylesheet" type="text/css" />

  <title>Transcription Page</title>
</head>

<body>
  <header class="header">
    <img class="free-comett-logo" src="images/FreeComETT-logo.png" />
    <!-- <nav class="main-nav">
      <ul class="nav-list">
        <li><a class="nav-link" href="#">File</a></li>
        <li><a class="nav-link" href="#">Edit</a></li>
        <li><a class="nav-link" href="#">Tools</a></li>
        <li><a class="nav-link" href="#">Support</a></li>
      </ul>
    </nav> -->
    <!-- <img class="free-reg-logo" src="images/freeREG-logo3.jpg" /> -->
  </header>
  <main>
    <div class="nav-container">
      <!-- top bar -->

      <div class="reference-bar">
        <div class="reference-bar-left">
          <p>Assignment - STS198_174927493857810</p>
        </div>
        <!-- image page number -->
        <!-- to be turned back on later -->
        <div class="page-tools is-visible">
          <input type="image" src="images/btn-left.png" class="btn-left" title="Previous page" />
          <div>
            Image <span class="cur-img-num">1</span> of
            <span class="total-img-num">4</span>
          </div>
          <input type="image" src="images/btn-right.png" class="btn-right" title="Next page" />
        </div>

        <div class="reference-bar-right">
          <p>Records transcribed - xxxxxxxxx</p>
        </div>
      </div>

      <!-- image viewing control -->

      <!-- image viewing toolbox  -->
      <!-- setting icon -->
      <div class="toolbox">
        <div title="Setting">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" 
            stroke="currentColor" class="setting-button icon" data-target="setting">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4.5 12a7.5 7.5 0 0 0 15 0m-15 0a7.5 7.5 0 1 1 15 0m-15 0H3m16.5 0H21m-1.5 0H12m-8.457 3.077 1.41-.513m14.095-5.13 1.41-.513M5.106 17.785l1.15-.964m11.49-9.642 1.149-.964M7.501 19.795l.75-1.3m7.5-12.99.75-1.3m-6.063 16.658.26-1.477m2.605-14.772.26-1.477m0 17.726-.26-1.477M10.698 4.614l-.26-1.477M16.5 19.794l-.75-1.299M7.5 4.205 12 12m6.894 5.785-1.149-.964M6.256 7.178l-1.15-.964m15.352 8.864-1.41-.513M4.954 9.435l-1.41-.514M12.002 12l-3.75 6.495" />
          </svg>
        </div>
        <div class="image-editor-toolbar is-invisible">
          <!-- image adjustment  -->

          <div class="icon-group">

            <!-- brightness -->
            <div title="Brightness">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" 
                stroke="currentColor" id="brightness-icon" data-target="brightness" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
              </svg>


            </div>
            <!-- contrast -->
            <!-- <input type="image" id="contrast-icon" data-target="contrast" src="images/contrast-symbol.png" class="icon"
              title="Contrast" /> -->
            <div title="Contrast">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor"  stroke-linecap="round" stroke-linejoin="round"
                class="icon" id="contrast-icon" data-target="contrast">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 18a6 6 0 0 0 0-12v12z" />
              </svg>
            </div>
            <!-- rotate -->
            <div title="Rotate">
              <svg id="rotate-icon" class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor"  stroke-linecap="round"
                stroke-linejoin="round" class="icon">
                <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
                <path d="M21 3v5h-5" />
              </svg>
            </div>

            <!-- zoom -->
            <div title="Zoom in">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" 
                stroke="currentColor" class="zoom icon" data-zoom="in" id="zoom-in">
                <path stroke-linecap=" round" stroke-linejoin="round"
                  d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607ZM10.5 7.5v6m3-3h-6" />
              </svg>
            </div>
            <div class="icon zoom-display">
              <span class="zoom-value">100 %</span>
            </div>
            <div title="Zoom out">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" 
                stroke="currentColor" class="zoom icon" data-zoom="out" id="zoom-out">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607ZM13.5 10.5h-6" />
              </svg>
            </div>
            <div class="icon reset">Reset</div>
          </div>

          <!-- sliders -->
          <div class="img-tools-sliders">
            <div class="brightness-slider-wrapper slider-wrapper-style is-invisible">
              <label for="brightness-slider">Brightness</label>
              <input type="range" id="brightness-slider" class="slider-input" min="50" max="200" value="125" />
            </div>
            <div class="contrast-slider-wrapper  slider-wrapper-style is-invisible">
              <label for="contrast-slider">Contrast</label>
              <input type="range" id="contrast-slider" class="slider-input" min="50" max="200" value="125" />
            </div>
          </div>
        </div>
      </div>



    </div>

    <!-- image canvas -->
    <div class="canvas-container">
      <!-- lia -->
      <canvas id="image" class="image"></canvas>

    </div>

  </main>

  <script src="images_editor.js"></script>
</body>

</html>
